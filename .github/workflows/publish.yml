name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  id-token: write # OIDC: trusted publishing + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # trusted publishing требует npm >= 11.5.1 (Node 22 несёт npm 10 — будет 404)
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # prepublishOnly соберёт dist; аутентификация — OIDC trusted publishing, токены не нужны
      - run: npm publish --provenance --access public
